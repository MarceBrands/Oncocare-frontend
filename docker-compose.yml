services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oncocare
      POSTGRES_USER: oncocare
      POSTGRES_PASSWORD: oncocare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oncocare -d oncocare"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://oncocare:oncocare@postgres:5432/oncocare
    volumes:
      - ./db/migrations:/migrations:ro
      - ./db/migrate.sh:/migrate.sh:ro
    command: ["sh", "/migrate.sh"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://oncocare:oncocare@postgres:5432/oncocare
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

volumes:
  postgres_data:
  node_modules:
